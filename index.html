
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đề thi AI & Ma trận nghịch đảo</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
body{font-family:Arial;max-width:1200px;margin:auto;padding:20px;background:#f4f6fa}
.q{background:white;padding:15px;margin:15px;border-radius:10px}
button.opt{display:block;width:100%;margin:5px;padding:10px;border:none;border-radius:6px;background:#eee;cursor:pointer}
.correct{background:#8f8!important}
.wrong{background:#f88!important}
.explain{display:none;margin-top:10px;padding:10px;background:#eef}
h1{text-align:center}
#score{position:sticky;top:0;background:#222;color:white;padding:10px}
</style>
</head>
<body>
<h1>Đề trắc nghiệm AI & Ma trận nghịch đảo</h1>
<div id='score'>Điểm: <span id='s'>0</span>/20</div>
<div id='quiz'></div>

<script>
const qs=[
{q:"Ba trụ cột AI?",o:["Prompt Context Harnessing","ML DL NN","Toán Lý Hóa","ChatGPT Claude Gemini"],a:0,e:"Đó là mô hình bài giảng đưa ra.",tip:"Nhớ PCH."},
{q:"Harnessing là?",o:["Cài AI","Điều khiển AI","Tắt AI","Sửa lỗi"],a:1,e:"Ghì cương AI.",tip:"Liên tưởng cưỡi ngựa."},
{q:"Vai trò mới của giáo viên?",o:["Chấm điểm","Giảng liên tục","Chỉ cách học","Làm slide"],a:2,e:"Thầy chỉ cách học.",tip:"Nhớ câu 'thầy chỉ cách'."},
{q:"Context là?",o:["Ngữ cảnh","Thuật toán","Dữ liệu","Máy học"],a:0,e:"Context = ngữ cảnh.",tip:"Con-text."},
{q:"AI clone giáo viên dùng để?",o:["Nhân bản phong cách","Thay toán","Tắt học","Tăng điểm"],a:0,e:"Nhân bản phong cách.",tip:"Clone = sao chép."},

{q:"\(A=\begin{pmatrix}2&1\\1&3\end{pmatrix}\). Tính \(det(A)\)",o:["5","6","4","7"],a:0,e:"2×3−1×1=5",tip:"2x2: ad−bc"},
{q:"\(det\begin{pmatrix}1&2\\3&4\end{pmatrix}\)",o:["2","-2","5","1"],a:1,e:"1×4−2×3=-2",tip:"ad−bc"},
{q:"Nếu det(A)=0?",o:["Khả nghịch","Không khả nghịch","Bằng I","Không xác định"],a:1,e:"Không có nghịch đảo.",tip:"det=0 → loại."},
{q:"Minor là?",o:["Định thức con","Ma trận nghịch đảo","Định thức chính","Vector"],a:0,e:"Bỏ hàng cột.",tip:"Nhớ 'ma trận con'."},
{q:"Cofactor?",o:["Mij","(-1)^(i+j)Mij","adj","det"],a:1,e:"Định nghĩa.",tip:"Dấu +− xen kẽ."},

{q:"\(A=\begin{pmatrix}1&0\\0&1\end{pmatrix}\), \(A^{-1}\)=?",o:["A","0","-A","2A"],a:0,e:"Ma trận đơn vị.",tip:"I^-1=I"},
{q:"\(det\begin{pmatrix}3&2\\1&5\end{pmatrix}\)",o:["13","15","10","7"],a:0,e:"15−2=13",tip:"ad−bc"},
{q:"\(A=\begin{pmatrix}4&2\\1&1\end{pmatrix}\),det?",o:["2","3","4","5"],a:0,e:"4−2=2",tip:"ad−bc"},
{q:"\(adj(A)\) là?",o:["Cofactor","Chuyển vị cofactor","Minor","det"],a:1,e:"Adj=(cofactor)^T",tip:"Adj→Transpose"},
{q:"Điều kiện có nghịch đảo?",o:["det≠0","det=0","a=b","vuông"],a:0,e:"Điều kiện đủ.",tip:"det khác 0"},

{q:"\(A=\begin{pmatrix}2&1\\1&2\end{pmatrix}\),det?",o:["3","4","2","1"],a:0,e:"4−1=3",tip:"ad−bc"},
{q:"\(A=\begin{pmatrix}2&1\\1&2\end{pmatrix}\), phần tử đầu \(A^{-1}\)?",o:["2/3","1/3","-1/3","3"],a:0,e:"(1/3)[2 -1;-1 2]",tip:"Đổi chéo."},
{q:"Nếu A.A^-1=?",o:["I","0","A","A²"],a:0,e:"Định nghĩa.",tip:"Nghịch đảo→I"},
{q:"\(det\begin{pmatrix}5&3\\2&1\end{pmatrix}\)",o:["-1","1","2","3"],a:0,e:"5−6=-1",tip:"ad−bc"},
{q:"Công thức tổng quát?",o:["A/det","1/det(A)*adj(A)","det(A)*A","A²"],a:1,e:"Công thức chuẩn.",tip:"det dưới, adj trên"}
];

let score=0;
const quiz=document.getElementById("quiz");

qs.forEach((x,i)=>{
let div=document.createElement("div");
div.className="q";
let h=`<h3>Câu ${i+1}: ${x.q}</h3>`;
x.o.forEach((op,j)=>{
h+=`<button class='opt' onclick='check(this,${i},${j})'>${String.fromCharCode(65+j)}. ${op}</button>`;
});
h+=`<div class='explain' id='e${i}'>
<b>Đáp án:</b> ${String.fromCharCode(65+x.a)}<br>
<b>Giải thích:</b> ${x.e}<br>
<b>Mẹo nhanh:</b> ${x.tip}
</div>`;
div.innerHTML=h;
quiz.appendChild(div);
});

function check(btn,i,j){
let q=document.getElementsByClassName("q")[i];
if(q.dataset.done)return;
q.dataset.done=1;
let bs=q.querySelectorAll(".opt");
bs[qs[i].a].classList.add("correct");
if(j!=qs[i].a) btn.classList.add("wrong");
else {score++;document.getElementById("s").innerText=score;}
document.getElementById("e"+i).style.display="block";
}
</script>
</body>
</html>
